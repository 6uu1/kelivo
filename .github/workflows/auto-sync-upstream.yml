name: Auto Sync Upstream

on:
  schedule:
    # 每天 UTC 2:00 (北京时间 10:00) 自动检查
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      create_pr:
        description: '自动创建 PR (如否则只发 Issue 提醒)'
        required: false
        default: true
        type: boolean

env:
  UPSTREAM_REPO: 'Chevey339/kelivo'
  UPSTREAM_BRANCH: 'master'

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 📥 Add upstream remote
        run: |
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git
          git fetch upstream

      - name: 🏷️ Ensure labels exist
        id: labels
        run: |
          ensure_label() {
            local label_name="$1"
            local label_color="$2"
            local label_description="$3"
            local output_name="$4"

            # Use gh label view to check existence
            if gh label view "$label_name" --repo "${{ github.repository }}" >/dev/null 2>&1; then
              echo "${output_name}=true" >> "$GITHUB_OUTPUT"
              return 0
            fi

            if gh label create "$label_name" --color "$label_color" --description "$label_description" --repo "${{ github.repository }}" >/dev/null 2>&1; then
              echo "${output_name}=true" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::无法创建标签 ${label_name}，后续将跳过该标签"
              echo "${output_name}=false" >> "$GITHUB_OUTPUT"
            fi
          }

          ensure_label sync "0366D6" "Upstream sync related" sync_ready
          ensure_label automated "CCCCCC" "Auto-generated by workflow" automated_ready
          ensure_label needs-attention "D93F0B" "Requires manual review" needs_attention_ready

      - name: 🔍 Check for updates
        id: check
        run: |
          UPSTREAM_SHA=$(git rev-parse upstream/${{ env.UPSTREAM_BRANCH }})
          LOCAL_SHA=$(git rev-parse origin/${{ env.UPSTREAM_BRANCH }})

          echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT
          echo "local_sha=$LOCAL_SHA" >> $GITHUB_OUTPUT

          if [ "$UPSTREAM_SHA" != "$LOCAL_SHA" ]; then
            COMMITS_BEHIND=$(git rev-list --count HEAD..upstream/${{ env.UPSTREAM_BRANCH }})
            COMMITS_AHEAD=$(git rev-list --count upstream/${{ env.UPSTREAM_BRANCH }}..HEAD)

            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "commits_behind=$COMMITS_BEHIND" >> $GITHUB_OUTPUT
            echo "commits_ahead=$COMMITS_AHEAD" >> $GITHUB_OUTPUT

            echo "::notice::上游有 $COMMITS_BEHIND 个新提交"

            # 获取最近的提交日志
            echo "### 上游更新内容" > /tmp/upstream_changes.md
            echo "" >> /tmp/upstream_changes.md
            git log --oneline --decorate HEAD..upstream/${{ env.UPSTREAM_BRANCH }} | head -20 >> /tmp/upstream_changes.md
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "::notice::已是最新"
          fi

      - name: 🔄 Create sync branch
        if: steps.check.outputs.has_updates == 'true'
        run: |
          SYNC_BRANCH="sync/upstream-$(date +%Y%m%d-%H%M%S)"
          echo "sync_branch=$SYNC_BRANCH" >> $GITHUB_OUTPUT
          git checkout -b $SYNC_BRANCH
          git merge upstream/${{ env.UPSTREAM_BRANCH }} --no-edit || true

      - name: 📝 Check for conflicts
        if: steps.check.outputs.has_updates == 'true'
        id: conflict
        run: |
          if git diff --check; then
            echo "has_conflicts=false" >> $GITHUB_OUTPUT
          else
            echo "has_conflicts=true" >> $GITHUB_OUTPUT
            echo "::warning::存在合并冲突"
          fi

      - name: 🚀 Create Pull Request
        if: |
          steps.check.outputs.has_updates == 'true' &&
          steps.conflict.outputs.has_conflicts != 'true' &&
          github.event.inputs.create_pr != 'false'
        run: |
          SYNC_BRANCH=$(git branch --show-current)
          git push origin $SYNC_BRANCH

          COMMITS_BEHIND=${{ steps.check.outputs.commits_behind }}
          COMMITS_AHEAD=${{ steps.check.outputs.commits_ahead }}

          cat > /tmp/pr_body.md << 'EOF'
          ## 🔄 上游同步

          本 PR 自动同步上游仓库 [${{ env.UPSTREAM_REPO }}](https://github.com/${{ env.UPSTREAM_REPO }}) 的更新。

          ### 📊 同步状态
          - **落后上游**: ${{ steps.check.outputs.commits_behind }} 个提交
          - **领先上游**: ${{ steps.check.outputs.commits_ahead }} 个提交

          ### 📝 上游更新日志

          EOF

          git log --oneline --decorate HEAD~${COMMITS_BEHIND}..HEAD >> /tmp/pr_body.md

          # Create PR first without passing label args (labels may not exist yet)
          PR_NUMBER=$(gh pr create \
            --title "🔄 同步上游更新 ($(date +%Y-%m-%d))" \
            --body-file /tmp/pr_body.md \
            --base ${{ env.UPSTREAM_BRANCH }} \
            --head $SYNC_BRANCH \
            --repo "${{ github.repository }}" \
            --json number --jq .number) || true

          if [ -z "$PR_NUMBER" ]; then
            echo "::error::PR 未创建，终止流程"
            exit 1
          fi

          # Try to add labels; failures should not stop the job
          if [ "${{ steps.labels.outputs.sync_ready }}" = "true" ]; then
            gh pr edit "$PR_NUMBER" --add-label sync --repo "${{ github.repository }}" || echo "::warning::无法添加标签 sync"
          else
            echo "::warning::标签 sync 不可用，PR 将不附带该标签"
          fi

          if [ "${{ steps.labels.outputs.automated_ready }}" = "true" ]; then
            gh pr edit "$PR_NUMBER" --add-label automated --repo "${{ github.repository }}" || echo "::warning::无法添加标签 automated"
          else
            echo "::warning::标签 automated 不可用，PR 将不附带该标签"
          fi

      - name: 📋 Create Issue (if conflicts or PR disabled)
        if: |
          steps.check.outputs.has_updates == 'true' &&
          (steps.conflict.outputs.has_conflicts == 'true' ||
           github.event.inputs.create_pr == 'false')
        run: |
          COMMITS_BEHIND=${{ steps.check.outputs.commits_behind }}

          cat > /tmp/issue_body.md << EOF
          ## 🔄 上游有更新需要同步

          上游仓库 [${{ env.UPSTREAM_REPO }}](https://github.com/${{ env.UPSTREAM_REPO }}) 有 **${COMMITS_BEHIND}** 个新提交。

          ### 📝 更新内容

          EOF

          git log --oneline --decorate HEAD..upstream/${{ env.UPSTREAM_BRANCH }} | head -20 >> /tmp/issue_body.md

          if [ "${{ steps.conflict.outputs.has_conflicts }}" == "true" ]; then
            cat >> /tmp/issue_body.md << EOF

          ⚠️ **存在合并冲突，需要手动解决**

          ### 解决方法
          ```bash
          git fetch upstream
          git merge upstream/${{ env.UPSTREAM_BRANCH }}
          # 解决冲突后
          git commit
          git push origin ${{ env.UPSTREAM_BRANCH }}
          ```
          EOF
          fi

          ISSUE_LABEL_ARGS=()
          if [ "${{ steps.labels.outputs.sync_ready }}" = "true" ]; then
            ISSUE_LABEL_ARGS+=(--label sync)
          else
            echo "::warning::标签 sync 不可用，Issue 将不附带该标签"
          fi

          if [ "${{ steps.labels.outputs.needs_attention_ready }}" = "true" ]; then
            ISSUE_LABEL_ARGS+=(--label needs-attention)
          else
            echo "::warning::标签 needs-attention 不可用，Issue 将不附带该标签"
          fi

          gh issue create \
            --title "🔄 上游更新需要同步 ($(date +%Y-%m-%d))" \
            --body-file /tmp/issue_body.md \
            "${ISSUE_LABEL_ARGS[@]}" --repo "${{ github.repository }}"

      - name: ✅ No updates needed
        if: steps.check.outputs.has_updates != 'true'
        run: |
          echo "✅ 已是最新，无需同步"

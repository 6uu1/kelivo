name: Quick Build

# 快速构建 - 仅构建当前平台，用于快速验证
on:
  push:
    branches-ignore:
      - 'sync/*'
      - 'dependabot/*'
    paths:
      - 'lib/**'
      - 'test/**'
      - 'pubspec.yaml'
      - '.github/workflows/quick-build.yml'
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.35.7'

jobs:
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔍 Analyze
        run: dart analyze --fatal-infos lib test

      - name: 🧪 Test
        run: flutter test --reporter=github

  build-windows:
    name: Build Windows
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
    runs-on: windows-latest

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 📝 Inject fallback
        shell: bash
        run: |
          mkdir -p lib/secrets
          cat > lib/secrets/fallback.dart <<'EOF'
          const String siliconflowFallbackKey = '${{ secrets.SILICONFLOW_KEY }}';
          EOF

      - name: 🏗️ Build Windows
        run: |
          flutter pub get
          flutter build windows --release

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Quick
          path: build/windows/x64/runner/Release/
          retention-days: 7

  build-android:
    name: Build Android
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 📝 Inject fallback
        shell: bash
        run: |
          mkdir -p lib/secrets
          cat > lib/secrets/fallback.dart <<'EOF'
          const String siliconflowFallbackKey = '${{ secrets.SILICONFLOW_KEY }}';
          EOF

      - name: 🏗️ Build Android
        run: flutter build apk --release

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-Quick
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
